services:

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb-wallguard
    environment:
      POSTGRES_DB:       wallguard
      POSTGRES_USER:     wallguard
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallguard"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    container_name: server-wallguard
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      DATABASE_URL:      postgres://wallguard:dev_password@postgres:5432/wallguard
      # TLS — paths inside the container; certs are generated on first run if absent.
      CA_CERT_PATH:      /etc/wallguard-server/ca.crt
      CA_KEY_PATH:       /etc/wallguard-server/ca.key
      SERVER_CERT_PATH:  /etc/wallguard-server/server.crt
      SERVER_KEY_PATH:   /etc/wallguard-server/server.key
      # SERVER_NAME must match the Docker service name so the generated SAN is valid.
      SERVER_NAME:       wallguard-server
      # Ports (override defaults only where we want non-standard values)
      HTTP_PORT:         "4444"
      GRPC_PORT:         "50051"     # device provisioning
      CONTROL_GRPC_PORT: "50052"     # agent control channel (mTLS)
      QUIC_PORT:         "7777"
      TCP_TLS_PORT:      "7778"
      METRICS_PORT:      "9090"
      RUST_LOG:          info,wg_server=debug
      LOG_FORMAT:        pretty
    ports:
      - "4444:4444"       # HTTP API + Web UI
      - "50051:50051"     # Device provisioning gRPC
      - "50052:50052"     # Agent control gRPC (mTLS)
      - "7777:7777/udp"   # QUIC reverse tunnel
      - "7778:7778"       # TCP-TLS reverse tunnel fallback
      - "9090:9090"       # Prometheus metrics
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Writable bind-mount so the server can write generated certs on first run.
      # The host directory is created by Docker if it does not exist.
      - ./dev-certs:/etc/wallguard-server

  prometheus:
    container_name: prometheus-wallguard
    image: prom/prometheus:latest
    volumes:
      - ./dev/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9091:9090"
    depends_on:
      - server

  grafana:
    container_name: grafana-wallguard
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: dev_password
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
