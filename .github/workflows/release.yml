name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/wallguard-server

jobs:
  build-agent:
    name: Build Agent (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            archive: wg-agent-x86_64-linux.tar.gz
          - target: aarch64-unknown-linux-musl
            archive: wg-agent-aarch64-linux.tar.gz
          # FreeBSD cross-compilation requires a FreeBSD sysroot or cross-compiler.
          # Placeholder — enable once cross-compilation toolchain is configured.
          # - target: x86_64-unknown-freebsd
          #   archive: wg-agent-x86_64-freebsd.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        uses: taiki-e/install-action@cross

      - name: Build agent
        run: cross build --release --target ${{ matrix.target }} -p wg-agent -p wg-cli

      - name: Package
        run: |
          mkdir -p dist
          tar -czf dist/${{ matrix.archive }} \
            -C target/${{ matrix.target }}/release wg-agent wg-cli

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}

  build-server:
    name: Build & Push Server Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-agent, build-server]

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.tar.gz
