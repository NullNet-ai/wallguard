name: Server Docker

on:
  push:
    branches: [main]
    paths:
      - 'wallguard-server/**'
      - 'wallguard-common/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Normalize organization name
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER_LOWER=$OWNER_LOWER" >> "$GITHUB_ENV"

      - name: Compute short SHA
        id: sha
        run: echo "short=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          # Two tags per build:
          #   :latest        — always points to the newest image
          #   :sha-<hash>    — permanent, immutable reference to this exact build
          tags: |
            ghcr.io/${{ env.OWNER_LOWER }}/wallguard-server:latest
            ghcr.io/${{ env.OWNER_LOWER }}/wallguard-server:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Keep the three most recent versioned images.
      # :latest is excluded from the count so it is never deleted.
      - name: Prune old images (keep last 3)
        uses: actions/delete-package-versions@v5
        with:
          package-name: wallguard-server
          package-type: container
          min-versions-to-keep: 3
          ignore-versions: '^latest$'
