name: Packages CI

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:

  build-deb-and-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version from tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Using version: $VERSION"

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libpcap-dev protobuf-compiler \
            libpipewire-0.3-dev libpipewire-0.3-modules libspa-0.2-dev \
            libxcb1-dev libxcb-shm0-dev libxcb-randr0-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-zigbuild and Zig
        run: |
          pip3 install ziglang
          cargo install cargo-zigbuild
          cargo-zigbuild --version   # fail fast if install did not work

      - name: Build binaries with zigbuild (glibc ≥ 2.17)
        run: |
          rustup target add x86_64-unknown-linux-gnu
          cargo zigbuild \
            --target x86_64-unknown-linux-gnu.2.17 \
            --release -p wallguard -p wallguard-cli

      - name: Package .deb
        env:
          WALLGUARD_BIN_DIR: target/x86_64-unknown-linux-gnu/release
        run: ./packbuild.sh deb "$VERSION"

      - name: Package binary tarball  (for install.sh fallback)
        env:
          WALLGUARD_BIN_DIR: target/x86_64-unknown-linux-gnu/release
        run: ./packbuild.sh tarball "$VERSION"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            wallguard_${{ env.VERSION }}_amd64.deb
            wallguard-${{ env.VERSION }}-linux-x86_64.tar.gz
            install.sh

  build-rpm-and-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version from tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libpcap-dev protobuf-compiler rpm \
            libpipewire-0.3-dev libpipewire-0.3-modules libspa-0.2-dev \
            libxcb1-dev libxcb-shm0-dev libxcb-randr0-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-zigbuild and Zig
        run: |
          pip3 install ziglang
          cargo install cargo-zigbuild
          cargo-zigbuild --version   # fail fast if install did not work

      - name: Build binaries with zigbuild (glibc ≥ 2.17)
        run: |
          rustup target add x86_64-unknown-linux-gnu
          cargo zigbuild \
            --target x86_64-unknown-linux-gnu.2.17 \
            --release -p wallguard -p wallguard-cli

      - name: Package .rpm
        env:
          WALLGUARD_BIN_DIR: target/x86_64-unknown-linux-gnu/release
        run: ./packbuild.sh rpm "$VERSION"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            wallguard-${{ env.VERSION }}-1.x86_64.rpm

  build-macos-and-release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version from tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Install system dependencies
        run: |
          brew install protobuf

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build macOS DMG  (universal x86_64 + aarch64)
        run: ./packbuild.sh macos "$VERSION"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            wallguard-${{ env.VERSION }}-macos.dmg

  build-windows-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version from tag
        run: |
          $TAG = "${{ github.ref }}" -replace "refs/tags/", ""
          $VERSION = $TAG -replace "^v", ""
          echo "VERSION=$VERSION" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "Using version: $VERSION"

      - name: Install build dependencies
        run: |
          choco install -y protoc

          # Npcap SDK — headers and import libs needed to compile the pcap crate.
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-sdk-1.13.zip" -OutFile "C:/npcap-sdk.zip"
          Expand-Archive -LiteralPath C:/npcap-sdk.zip -DestinationPath C:/npcap-sdk
          echo "LIB=C:/npcap-sdk/Lib/x64" >> $env:GITHUB_ENV

      - name: Install WiX Toolset v4 and UI extension
        run: |
          dotnet tool install --global wix --version "4.*"
          # Pin the extension to the exact same version as the installed tool.
          # Using "latest" causes WIX0144 when the extension version doesn't
          # match the wix tool version.
          $wixVer = (wix --version 2>&1).Trim() -replace '\+.*', ''
          Write-Host "WiX version: $wixVer"
          wix extension add "WixToolset.UI.wixext/$wixVer" --global

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Windows MSI package
        run: .\packbuild.ps1 -Version ${{ env.VERSION }}

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            wallguard-${{ env.VERSION }}-x86_64.msi

  build-freebsd-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@main
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Determine version from tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Install dependencies and build FreeBSD package
        uses: cross-platform-actions/action@v1.1.0
        with:
          operating_system: freebsd
          architecture: x86_64
          version: '14.3'
          cpu_count: 4
          memory: 16G
          environment_variables: VERSION
          shutdown_vm: true
          sync_files: true
          run: |
            sudo pkg update
            sudo pkg install -y gmake cmake llvm libpcap protobuf bash
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            export PATH=$HOME/.cargo/bin:$PATH
            bash ./packbuild.sh freebsd "$VERSION"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            wallguard-${{ env.VERSION }}.pkg
