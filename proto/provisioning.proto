syntax = "proto3";
package wallguard.provisioning;

// ---------------------------------------------------------------------------
// Provisioning service — device enrollment.
// This service is exempt from client-certificate requirements; it runs over
// server-authenticated TLS only so unenrolled agents can reach it.
// All other services require mTLS with a signed device certificate.
// ---------------------------------------------------------------------------

service Provisioning {
  // One-shot enrollment: agent presents a one-time installation code and a
  // CSR; server signs the cert, creates the Device row, and returns the
  // signed cert plus CA chain.
  rpc Enroll(EnrollRequest) returns (EnrollResponse);
}

message EnrollRequest {
  // Single-use code generated by an operator via the web UI or API.
  string installation_code = 1;

  // PEM-encoded CSR. CN must be "device:<new-uuid>".
  // The Ed25519 private key is generated on the device and never transmitted.
  string csr_pem           = 2;

  // Human-readable firewall software identifier (display only on the server).
  string firewall_kind     = 3;

  // Semver agent version string.
  string agent_version     = 4;
}

message EnrollResponse {
  // UUID assigned to this device (matches CN in the signed cert).
  string device_id      = 1;

  // PEM-encoded signed device certificate.
  string device_cert_pem = 2;

  // PEM-encoded Intermediate CA certificate the agent should pin.
  string ca_cert_pem    = 3;

  // Canonical server hostname to use for subsequent connections.
  string server_name    = 4;
}
