message LoginRequest {
  LoginBody body = 1;
  LoginParams params = 2;
}

message LoginParams {
  string is_root = 1;
  string t = 2;
}

message LoginBody {
  LoginData data = 1;
}

message LoginData {
  string account_id = 1;
  string account_secret = 2;
}

message LoginResponse {
  string token = 1;
}

message RegisterDeviceRequest {
  RegisterDeviceParams device = 1;
}

message RegisterDeviceParams {
  string organization_id = 1;
  string account_id = 2;
  string account_secret = 3;
  bool is_new_user = 4;
  bool is_invited = 5;
  string role_id = 6;
  string account_organization_status = 7;
  repeated string account_organization_categories = 8;
  repeated string device_categories = 9;
  string device_id = 10;
}

message Response {
  bool success = 1;
  string message = 2;
  string error = 3;
  string status_code = 4;
  int32 count = 5;
  string data = 6;
}
