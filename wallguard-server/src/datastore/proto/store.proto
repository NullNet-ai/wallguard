// Enum for aggregation types
enum AggregationType {
  SUM = 0;
  AVG = 1;
  COUNT = 2;
  MIN = 3;
  MAX = 4;
  STDDEV = 5;
  VARIANCE = 6;
  ARRAY_AGG = 7;
}

// Enum for filter operators
enum FilterOperator {
  equal = 0;
  not_equal = 1;
  greater_than = 2;
  greater_than_or_equal = 3;
  less_than = 4;
  less_than_or_equal = 5;
  is_null = 6;
  is_not_null = 7;
  contains = 8;
  not_contains = 9;
  like = 10;
  is_between = 11;
  is_not_between = 12;
  is_empty = 13;
  is_not_empty = 14;
  has_no_value = 15;
  and = 16;
  or = 17;
}

// Enum for match patterns
enum MatchPattern {
  EXACT = 0;
  PREFIX = 1;
  SUFFIX = 2;
  CONTAINS_PATTERN = 3;
  CUSTOM = 4;
}

// Individual aggregation definition
message Aggregation {
  AggregationType aggregation = 1;
  string aggregate_on = 2;
  string bucket_name = 3;
}

// Order specification for aggregation results
message AggregationOrder {
  string order_by = 1;
  string order_direction = 2;
}

// Relation endpoint for joins
message RelationEndpoint {
  string entity = 1;
  string field = 2;
  optional string alias = 3;
  optional string order_direction = 4;
  optional string order_by = 5;
  optional int32 limit = 6;
  optional int32 offset = 7;
  repeated FilterCriteria filters = 8;
}

// Field relation for joins
message FieldRelation {
  RelationEndpoint to = 1;
  RelationEndpoint from = 2;
}

// Join definition
message Join {
  string type = 1;  // "left", "right", "inner", etc.
  FieldRelation field_relation = 2;
  optional bool nested = 3;
}

// Simplified filter criteria with type field
message FilterCriteria {
  string type = 1;  // "criteria" or "operator"
  optional string field = 2;
  optional string entity = 3;
  optional FilterOperator operator = 4;  // Can be filter operator or logical operator (and/or)
  repeated string values = 5;  // JSON values as strings
  optional bool case_sensitive = 6;
  optional string parse_as = 7;
  optional MatchPattern match_pattern = 8;
  optional bool is_search = 9;
  optional bool has_group_count = 10;
}

// Main aggregation filter request
message AggregationFilterRequest {
  AggregationFilterParams params = 1;
  message AggregationFilterBody {
    string entity = 1;
    repeated Aggregation aggregations = 2;
    repeated FilterCriteria advance_filters = 3;
    repeated Join joins = 4;
    optional int32 limit = 5;
    optional string bucket_size = 6;
    optional string timezone = 7;
    optional AggregationOrder order = 8;
  }
  AggregationFilterBody body = 2;
}

// Aggregation filter response with flexible JSON structure
message AggregationFilterResponse {
  bool success = 1;
  string message = 2;
  int32 count = 3;
  string data = 4;  // Single JSON string containing the entire result array
}

// GetByFilter request for advanced filtering queries
message GetByFilterRequest {
  GetByFilterParams params = 1;
  message GetByFilterBody {
    repeated string pluck = 1;  // Fields to select
    message PluckObjectEntry {
      string key = 1;
      repeated string value = 2;
    }
    repeated PluckObjectEntry pluck_object = 2;  // Object-based field selection
    repeated PluckObjectEntry pluck_group_object = 3;  // Group object field selection
    repeated FilterCriteria advance_filters = 4;  // Filter conditions
    repeated FilterCriteria group_advance_filters = 5;  // Group filter conditions
    repeated Join joins = 6;  // Join definitions
    optional string group_by_fields = 7;  // JSON string of group by fields
    optional bool group_by_has_count = 8;  // Include count in group by
    optional string concatenate_fields = 9;  // JSON string of concatenate fields
    repeated string multiple_sort = 10;  // JSON array of sort options
    optional string date_format = 11;  // Date format string
    optional string order_by = 12;  // Primary sort field
    optional string order_direction = 13;  // Sort direction (asc/desc)
    optional bool is_case_sensitive_sorting = 14;  // Case sensitive sorting
    optional int32 offset = 15;  // Pagination offset
    optional int32 limit = 16;  // Result limit
    optional string distinct_by = 17;  // Distinct field
    optional string timezone = 18;  // Timezone for date operations
    optional string time_format = 19;  // Time format string
    optional string materialized_view = 20;  // JSON string of materialized view config
  }
  GetByFilterBody body = 2;
}

// GetByFilter response with flexible JSON structure
message GetByFilterResponse {
  bool success = 1;
  string message = 2;
  int32 count = 3;
  string data = 4;  // JSON string containing the result array
}

// Store service definition with CRUD operations
service StoreService {
  // Create a new UserRoles
  rpc CreateUserRoles(CreateUserRolesRequest) returns (CreateUserRolesResponse);

  // Get a UserRoles by ID
  rpc GetUserRoles(GetUserRolesRequest) returns (GetUserRolesResponse);

  // Update an existing UserRoles
  rpc UpdateUserRoles(UpdateUserRolesRequest) returns (UpdateUserRolesResponse);

  // Delete a UserRoles by ID
  rpc DeleteUserRoles(DeleteUserRolesRequest) returns (DeleteUserRolesResponse);

  // Batch insert multiple UserRoless
  rpc BatchInsertUserRoles(BatchInsertUserRolesRequest) returns (BatchInsertUserRolesResponse);

  // Batch update multiple UserRoless based on filters
  rpc BatchUpdateUserRoles(BatchUpdateUserRolesRequest) returns (BatchUpdateUserRolesResponse);

  // Batch delete multiple UserRoless based on filters
  rpc BatchDeleteUserRoles(BatchDeleteUserRolesRequest) returns (BatchDeleteUserRolesResponse);

  // Upsert a UserRoles (create if not exists, update if exists)
  rpc UpsertUserRoles(UpsertUserRolesRequest) returns (UpsertUserRolesResponse);

  // Create a new Sessions
  rpc CreateSessions(CreateSessionsRequest) returns (CreateSessionsResponse);

  // Get a Sessions by ID
  rpc GetSessions(GetSessionsRequest) returns (GetSessionsResponse);

  // Update an existing Sessions
  rpc UpdateSessions(UpdateSessionsRequest) returns (UpdateSessionsResponse);

