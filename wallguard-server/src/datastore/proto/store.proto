  rpc DeleteSessions(DeleteSessionsRequest) returns (DeleteSessionsResponse);

  // Batch insert multiple Sessionss
  rpc BatchInsertSessions(BatchInsertSessionsRequest) returns (BatchInsertSessionsResponse);

  // Batch update multiple Sessionss based on filters
  rpc BatchUpdateSessions(BatchUpdateSessionsRequest) returns (BatchUpdateSessionsResponse);

  // Batch delete multiple Sessionss based on filters
  rpc BatchDeleteSessions(BatchDeleteSessionsRequest) returns (BatchDeleteSessionsResponse);

  // Upsert a Sessions (create if not exists, update if exists)
  rpc UpsertSessions(UpsertSessionsRequest) returns (UpsertSessionsResponse);

  // Create a new SignedInActivities
  rpc CreateSignedInActivities(CreateSignedInActivitiesRequest) returns (CreateSignedInActivitiesResponse);

